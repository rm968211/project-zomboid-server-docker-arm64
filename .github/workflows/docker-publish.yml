name: Build and push image

on:
  schedule:
    - cron: '0 3 * * 0'  # weekly, Sunday midnight UTC
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
  workflow_dispatch:
    inputs:
      push_latest:
        description: "Push the latest tag"
        type: boolean
        default: true
      force_version_tags:
        description: "Force overwrite semver version tags (e.g. 1.0.0, 1.0, 1)"
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve version from latest git tag
        id: version
        run: |
          TAG=$(git describe --tags --match "v[0-9]*.[0-9]*.[0-9]*" --abbrev=0 2>/dev/null || echo "")
          if [ -n "$TAG" ]; then
            VERSION="${TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "major_minor=$MAJOR.$MINOR" >> $GITHUB_OUTPUT
            echo "major=$MAJOR" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/project-zomboid-server-docker-arm64
          tags: |
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ (github.ref_type == 'tag' || inputs.force_version_tags == 'true') && steps.version.outputs.found == 'true' }}
            type=raw,value=${{ steps.version.outputs.major_minor }},enable=${{ (github.ref_type == 'tag' || inputs.force_version_tags == 'true') && steps.version.outputs.found == 'true' }}
            type=raw,value=${{ steps.version.outputs.major }},enable=${{ (github.ref_type == 'tag' || inputs.force_version_tags == 'true') && steps.version.outputs.found == 'true' }}
            type=sha
          flavor: |
            latest=${{ github.event_name != 'workflow_dispatch' || inputs.push_latest == 'true' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
